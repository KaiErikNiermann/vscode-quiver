name: q.uiver Drift Check

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild vendored q.uiver and reapply patches
        run: pnpm vendor:quiver

      - name: Verify repository is unchanged
        run: git diff --exit-code
